<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="410" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">产教融合困境：校企利益不对齐</text>
  <!-- 学校 -->
  <rect x="30" y="50" width="350" height="260" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="350" height="44" rx="14" fill="#f59e0b"/>
  <rect x="30" y="78" width="350" height="16" fill="#f59e0b"/>
  <text x="205" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" opacity="1">学校侧</text>
  <rect x="55" y="108" width="300" height="40" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="205" y="133" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">签约校企合作基地 ✓</text>
  <rect x="55" y="158" width="300" height="40" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="205" y="183" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">少数学生参与实习</text>
  <rect x="55" y="208" width="300" height="40" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="205" y="233" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">实习内容 = 打杂</text>
  <rect x="55" y="262" width="300" height="32" rx="8" fill="#fef2f2"/>
  <text x="205" y="283" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">无系统能力建设 · 无验证机制</text>
  <!-- 企业 -->
  <rect x="440" y="50" width="350" height="260" rx="14" fill="#ffffff" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="440" y="50" width="350" height="44" rx="14" fill="#f87171"/>
  <rect x="440" y="78" width="350" height="16" fill="#f87171"/>
  <text x="615" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" opacity="1">企业侧</text>
  <rect x="465" y="108" width="300" height="40" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="615" y="133" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">需要的是&ldquo;能干活的人&rdquo;</text>
  <rect x="465" y="158" width="300" height="40" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="615" y="183" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">不愿意承担培训成本</text>
  <rect x="465" y="208" width="300" height="40" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="615" y="233" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">校招成本高 · 试错风险大</text>
  <rect x="465" y="262" width="300" height="32" rx="8" fill="#fef2f2"/>
  <text x="615" y="283" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">企业要&ldquo;验证过的能力&rdquo; 学校给&ldquo;学习经历&rdquo;</text>
  <!-- 不等号 -->
  <text x="410" y="180" text-anchor="middle" fill="#e11d48" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="800">≠</text>
  <!-- 底部 -->
  <rect x="210" y="325" width="400" height="24" rx="12" fill="#0f172a"/>
  <text x="410" y="341" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">本质：校企双方的利益没有对齐</text>
</svg>