<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">产教融合困境：校企利益不对齐</text>
  <!-- 学校侧 -->
  <rect x="40" y="60" width="330" height="240" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="205" y="95" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="15" font-weight="700">学校侧</text>
  <rect x="65" y="115" width="280" height="40" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="205" y="140" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">签约校企合作基地 ✓</text>
  <rect x="65" y="165" width="280" height="40" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="205" y="190" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">少数学生参与实习</text>
  <rect x="65" y="215" width="280" height="40" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="205" y="240" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">实习内容 = 打杂</text>
  <rect x="65" y="265" width="280" height="25" rx="6" fill="#fef2f2"/>
  <text x="205" y="282" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="11">无系统能力建设 · 无验证机制</text>
  <!-- 企业侧 -->
  <rect x="430" y="60" width="330" height="240" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="595" y="95" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="15" font-weight="700">企业侧</text>
  <rect x="455" y="115" width="280" height="40" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="595" y="140" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">需要的是"能干活的人"</text>
  <rect x="455" y="165" width="280" height="40" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="595" y="190" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">不愿意承担培训成本</text>
  <rect x="455" y="215" width="280" height="40" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="595" y="240" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">校招成本高 · 试错风险大</text>
  <rect x="455" y="265" width="280" height="25" rx="6" fill="#fef2f2"/>
  <text x="595" y="282" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="11">企业要"验证过的能力" 学校给"学习经历"</text>
  <!-- 中间断裂 -->
  <text x="400" y="180" text-anchor="middle" fill="#e11d48" font-family="sans-serif" font-size="28" font-weight="800">≠</text>
  <rect x="200" y="315" width="400" height="20" rx="6" fill="#0f172a"/>
  <text x="400" y="329" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11">本质：校企双方的利益没有对齐</text>
</svg>