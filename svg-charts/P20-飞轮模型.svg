  <text x="200" y="305" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">AI能力感知</text>
  <text x="200" y="325" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" opacity="1">Learn</text>
  <circle cx="620" cy="290" r="72" fill="#f0fdf4" stroke="#22c55e" stroke-width="3" filter="url(#shadowLg)"/>
