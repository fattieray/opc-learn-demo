  <text x="410" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">&ldquo;学-练-就&rdquo;飞轮模型——三个闭环，持续自增强</text>
  <circle cx="200" cy="290" r="72" fill="#eff6ff" stroke="#3b82f6" stroke-width="3" filter="url(#shadowLg)"/>
