  <text x="620" y="325" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" opacity="1">Practice</text>
  <circle cx="410" cy="120" r="72" fill="#ede9fe" stroke="#7c3aed" stroke-width="3" filter="url(#shadowLg)"/>
  <text x="410" y="108" text-anchor="middle" fill="#6d28d9" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800" opacity="1">就</text>
  <text x="410" y="135" text-anchor="middle" fill="#6d28d9" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">信用护照</text>
  <text x="410" y="155" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" opacity="1">Achieve</text>
  <path d="M278 310 L543 310" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrowB)"/>
  <text x="410" y="335" text-anchor="middle" fill="#2563eb" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">发现短板 → 接任务验证</text>
  <path d="M590 230 Q510 160 470 135" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arrowG)"/>
  <text x="540" y="180" text-anchor="middle" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">任务完成 → 能力积累</text>
  <path d="M348 135 Q300 160 230 230" stroke="#7c3aed" stroke-width="2.5" fill="none" marker-end="url(#arrowV)"/>
  <text x="275" y="180" text-anchor="middle" fill="#7c3aed" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">更强信号 → 更好任务</text>
  <circle cx="410" cy="240" r="32" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="410" y="237" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700" opacity="1">飞轮</text>
  <text x="410" y="252" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700" opacity="1">效应</text>
  <rect x="90" y="390" width="280" height="55" rx="12" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="413" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">传统：学4年→毕业找工作</text>
  <text x="230" y="433" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">线性 · 断裂 · 无反馈</text>
  <rect x="450" y="390" width="280" height="55" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="413" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">我们：学⇄练⇄就</text>
  <text x="590" y="433" text-anchor="middle" fill="#15803d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">循环 · 连续 · 实时反馈</text>
  <text x="410" y="480" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">三个飞轮引擎：数据飞轮（更准匹配）+ 信号飞轮（更高信任）+ 网络飞轮（更多参与者）</text>
  <text x="410" y="505" text-anchor="middle" fill="#94a3b8" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">四年规划：大一微任务→大二标准任务→大三项目制→大四准雇佣（无缝过渡）</text>
