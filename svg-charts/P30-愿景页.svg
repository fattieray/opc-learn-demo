<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="0" fill="url(#vg)"/>
  <text x="400" y="60" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" letter-spacing="3" opacity="0.7">愿 景</text>
  <text x="400" y="120" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">让每一个学生的能力</text>
  <text x="400" y="160" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">都能被看见、被验证、被认可</text>
  <text x="400" y="195" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" opacity="0.8">——不论他来自哪所学校</text>
  <!-- 当前vs未来 -->
  <rect x="100" y="225" width="250" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)"/>
  <text x="225" y="250" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" opacity="0.7">当前</text>
  <text x="225" y="275" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12">二本学生有能力但信号弱</text>
  <text x="225" y="295" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12">被系统性低估</text>
  <rect x="450" y="225" width="250" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)"/>
  <text x="575" y="250" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" opacity="0.7">未来</text>
  <text x="575" y="275" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12">完成50个任务+雇主好评</text>
  <text x="575" y="295" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12">能力信号比肩985毕业生</text>
  <!-- 箭头 -->
  <path d="M355 265 L445 265" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <polygon points="440,259 453,265 440,271" fill="#fff" opacity="0.5"/>
  <!-- 底部 -->
  <text x="400" y="345" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" opacity="0.7">方向是确定的 · 路径需要探索 · 我们选择开始</text>
  <!-- 行动号召 -->
  <rect x="250" y="365" width="300" height="28" rx="14" fill="#22c55e"/>
  <text x="400" y="384" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12" font-weight="600">下一步：提交试点意向 → 需求对接 → 2周快速启动</text>
</svg>