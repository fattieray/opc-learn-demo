<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <text x="450" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">校领导的合理顾虑</text>
  <rect x="30" y="60" width="270" height="210" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="165" cy="90" r="18" fill="#d97706"/>
  <text x="165" y="96" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12" font-weight="700">1</text>
  <text x="165" y="120" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="14" font-weight="700">资源有限</text>
  <text x="165" y="150" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="11">· 人力资金时间都是稀缺资源</text>
  <text x="165" y="172" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="11">· 投入新项目=放弃其他机会</text>
  <text x="165" y="194" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="11">· 预算审批流程漫长</text>
  <rect x="315" y="60" width="270" height="210" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <circle cx="450" cy="90" r="18" fill="#e11d48"/>
  <text x="450" y="96" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12" font-weight="700">2</text>
  <text x="450" y="120" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="14" font-weight="700">风险担忧</text>
  <text x="450" y="150" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">· 平台是否靠谱？能否落地？</text>
  <text x="450" y="172" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">· 学生是否愿意参与？</text>
  <text x="450" y="194" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">· 企业是否认可能力护照？</text>
  <text x="450" y="216" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">· 数据安全如何保障？</text>
  <rect x="600" y="60" width="270" height="210" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="735" cy="90" r="18" fill="#475569"/>
  <text x="735" y="96" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12" font-weight="700">3</text>
  <text x="735" y="120" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="700">政绩考量</text>
  <text x="735" y="150" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="11">· 短期能否见效？</text>
  <text x="735" y="172" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="11">· 如何向上级汇报成果？</text>
  <text x="735" y="194" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="11">· 政策是否支持？</text>
  <text x="735" y="216" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="11">· 失败了怎么办？</text>
</svg>