<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Card 1 -->
  <rect x="20" y="20" width="280" height="270" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="20" y="20" width="280" height="56" rx="16" fill="url(#gBlue)"/>
  <rect x="20" y="50" width="280" height="26" fill="url(#gBlue)"/>
  <text x="160" y="55" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" opacity="1">🤖  AI Agent 爆发</text>
  <text x="40" y="105" text-anchor="start" fill="#1e293b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">AI从&ldquo;工具&rdquo;变成&ldquo;同事&rdquo;</text>
  <text x="40" y="130" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">智能体可独立完成复杂任务</text>
  <text x="40" y="155" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">人+AI成为新的能力单位</text>
  <text x="40" y="180" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">初级岗位被AI替代加速</text>
  <rect x="40" y="200" width="240" height="32" rx="8" fill="#eff6ff"/>
  <text x="160" y="221" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">→ &ldquo;会用AI&rdquo;成最基础要求</text>
  <!-- Card 2 -->
  <rect x="320" y="20" width="280" height="270" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="320" y="20" width="280" height="56" rx="16" fill="url(#gTeal)"/>
  <rect x="320" y="50" width="280" height="26" fill="url(#gTeal)"/>
  <text x="460" y="55" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" opacity="1">📊  大模型能力跃升</text>
  <text x="340" y="105" text-anchor="start" fill="#1e293b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">能力评估从不可能到低成本实现</text>
  <text x="340" y="130" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">个性化学习路径自动生成</text>
  <text x="340" y="155" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">需求-能力智能匹配成为可能</text>
  <text x="340" y="180" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">多模型交叉验证保障公平性</text>
  <rect x="340" y="200" width="240" height="32" rx="8" fill="#f0fdf4"/>
  <text x="460" y="221" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">→ 第一次让新解法成为可能</text>
  <!-- Card 3 -->
  <rect x="620" y="20" width="280" height="270" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="620" y="20" width="280" height="56" rx="16" fill="#f59e0b"/>
  <rect x="620" y="50" width="280" height="26" fill="#f59e0b"/>
  <text x="760" y="55" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" opacity="1">🏢  企业需求剧变</text>
  <text x="640" y="105" text-anchor="start" fill="#1e293b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">传统技能贬值加速</text>
  <text x="640" y="130" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">新岗位不断涌现</text>
  <text x="640" y="155" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">企业需要&ldquo;会用AI的人&rdquo;</text>
  <text x="640" y="180" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">灵活用工成为主流趋势</text>
  <rect x="640" y="200" width="240" height="32" rx="8" fill="#fef3c7"/>
  <text x="760" y="221" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">→ 先行者获得巨大先发优势</text>
  <!-- 底部 -->
  <rect x="200" y="305" width="520" height="10" rx="5" fill="#0f172a" opacity="0.04"/>
</svg>