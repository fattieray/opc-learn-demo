  <!-- 右侧标注 -->
  <text x="720" y="110" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">少数人</text>
  <text x="720" y="215" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">中等</text>
  <text x="720" y="295" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">大量</text>
  <text x="720" y="365" text-anchor="middle" fill="#2563eb" font-family="sans-serif" font-size="10" font-weight="700">所有学生</text>
  <text x="740" y="240" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9" transform="rotate(90,740,240)">参与人数 →</text>
