<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">任务层级金字塔：从微任务到准雇佣</text>
  <polygon points="400,60 680,350 120,350" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="220" y1="190" x2="580" y2="190" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="170" y1="270" x2="630" y2="270" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4"/>
  <!-- L4 -->
  <text x="400" y="110" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="14" font-weight="700">L4 准雇佣</text>
  <text x="400" y="132" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="11">3月+ | 月薪3000元+</text>
  <text x="400" y="150" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">基于前序表现的预筛选</text>
