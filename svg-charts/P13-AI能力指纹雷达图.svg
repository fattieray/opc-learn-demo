<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <text x="450" y="30" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">AI能力指纹示例</text>
  <!-- 雷达图背景 -->
  <rect x="30" y="50" width="380" height="310" rx="16" fill="#0f172a"/>
  <text x="220" y="80" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="600">能力指纹 · 张伟</text>
  <text x="220" y="100" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">数据科学专业 · 大三</text>
  <!-- 五边形网格 -->
  <polygon points="220,310 130,230 160,140 280,140 310,230" fill="none" stroke="#334155" stroke-width="1"/>
  <polygon points="220,270 155,215 175,155 265,155 285,215" fill="none" stroke="#334155" stroke-width="1"/>
  <polygon points="220,230 180,200 190,170 250,170 260,200" fill="none" stroke="#334155" stroke-width="1"/>
  <!-- 数据多边形 -->
  <polygon points="220,240 140,220 168,145 272,148 288,225" fill="#2563eb" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <!-- 数据点 -->
  <circle cx="220" cy="240" r="4" fill="#3b82f6"/>
  <circle cx="140" cy="220" r="4" fill="#3b82f6"/>
  <circle cx="168" cy="145" r="4" fill="#3b82f6"/>
  <circle cx="272" cy="148" r="4" fill="#3b82f6"/>
  <circle cx="288" cy="225" r="4" fill="#3b82f6"/>
  <!-- 标签 -->
  <text x="220" y="340" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">Python 88%</text>
  <text x="100" y="225" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">SQL 72%</text>
  <text x="140" y="130" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">可视化 68%</text>
  <text x="300" y="130" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">统计 42%</text>
  <text x="340" y="225" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">沟通 80%</text>
  <!-- 右侧能力叙事 -->
  <rect x="440" y="50" width="430" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="460" y="80" fill="#0f172a" font-family="sans-serif" font-size="13" font-weight="700">AI能力叙事</text>
  <text x="460" y="105" fill="#475569" font-family="sans-serif" font-size="11">"该学生在过去6个月完成了12个数据分析相关任务，</text>
  <text x="460" y="125" fill="#475569" font-family="sans-serif" font-size="11">数据处理和可视化能力突出（处于同专业前15%），</text>
  <text x="460" y="145" fill="#475569" font-family="sans-serif" font-size="11">统计建模正在快速成长，商业叙事能力有提升空间..."</text>
  <text x="460" y="175" fill="#94a3b8" font-family="sans-serif" font-size="10">基于23个任务记录 + 91%雇主好评率 自动生成</text>
  <!-- 缺口分析 -->
  <rect x="440" y="210" width="430" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="460" y="240" fill="#0f172a" font-family="sans-serif" font-size="13" font-weight="700">缺口分析</text>
  <rect x="460" y="255" width="120" height="24" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="520" y="272" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="11">统计建模 42%</text>
  <rect x="595" y="255" width="120" height="24" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="655" y="272" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="11">商业分析 待测</text>
  <rect x="460" y="290" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="520" y="307" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="11">推荐：统计入门</text>
  <rect x="595" y="290" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="655" y="307" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="11">推荐：商业案例</text>
  <text x="460" y="345" fill="#22c55e" font-family="sans-serif" font-size="11" font-weight="600">✓ 面试邀请：3个 → 11个（+267%）</text>
</svg>