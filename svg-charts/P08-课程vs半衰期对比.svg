<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">结构性矛盾：课程更新周期 vs 技能半衰期</text>
  <!-- 左侧 -->
  <rect x="60" y="60" width="300" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="90" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="14" font-weight="600">教师考核体系</text>
  <text x="210" y="115" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">论文 + 课题 + 职称</text>
  <text x="210" y="140" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">≠ 学生真实需求（就业+成长）</text>
  <!-- 右侧 -->
  <rect x="440" y="60" width="300" height="100" rx="12" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="590" y="90" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="14" font-weight="600">课程更新周期</text>
  <text x="590" y="115" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">5-10年</text>
  <text x="590" y="140" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">≠ 技能半衰期 1.5-2年</text>
  <!-- 对比柱 -->
  <rect x="200" y="200" width="120" height="80" rx="8" fill="#f59e0b" opacity="0.8"/>
  <text x="260" y="235" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">5-10年</text>
  <text x="260" y="260" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12">课程更新周期</text>
  <rect x="480" y="230" width="120" height="50" rx="8" fill="#e11d48" opacity="0.8"/>
  <text x="540" y="260" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="22" font-weight="800">1.5-2年</text>
  <text x="540" y="300" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="12" font-weight="500">技能半衰期</text>
  <!-- 不等号 -->
  <text x="400" y="250" text-anchor="middle" fill="#e11d48" font-family="sans-serif" font-size="36" font-weight="800">≠</text>
  <rect x="200" y="305" width="400" height="10" rx="5" fill="#0f172a" opacity="0.05"/>
</svg>