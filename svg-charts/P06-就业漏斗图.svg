<svg xmlns="http://www.w3.org/2000/svg" width="840" height="380" viewBox="0 0 840 380">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="420" y="30" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">就业漏斗：传统模式 vs 平台模式</text>
  <!-- 传统漏斗 -->
  <text x="210" y="65" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">传统模式</text>
  <polygon points="110,85 310,85 280,310 140,310" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <line x1="150" y1="140" x2="270" y2="140" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="115" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">投递简历</text>
  <text x="210" y="133" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" opacity="1">47份</text>
  <line x1="160" y1="195" x2="260" y2="195" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="170" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">获得面试</text>
  <text x="210" y="188" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" opacity="1">3个</text>
  <line x1="175" y1="250" x2="245" y2="250" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="225" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">收到Offer</text>
  <text x="210" y="243" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" opacity="1">1个</text>
  <text x="210" y="290" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500" opacity="1">转化率 2.1%</text>
  <!-- 平台漏斗 -->
  <text x="630" y="65" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">平台模式</text>
  <polygon points="530,85 730,85 700,310 560,310" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <line x1="570" y1="140" x2="690" y2="140" stroke="#86efac" stroke-width="1"/>
  <text x="630" y="115" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">精准匹配</text>
  <text x="630" y="133" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" opacity="1">能力护照</text>
  <line x1="560" y1="195" x2="700" y2="195" stroke="#86efac" stroke-width="1"/>
  <text x="630" y="170" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">获得面试</text>
  <text x="630" y="188" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" opacity="1">11个</text>
  <line x1="575" y1="250" x2="685" y2="250" stroke="#86efac" stroke-width="1"/>
  <text x="630" y="225" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" opacity="1">收到Offer</text>
  <text x="630" y="243" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" opacity="1">4个</text>
  <text x="630" y="290" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500" opacity="1">转化率 36.4%</text>
  <!-- 箭头 -->
  <line x1="315" y1="195" x2="525" y2="195" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowB)"/>
  <rect x="370" y="175" width="100" height="24" rx="12.0" fill="#2563eb"/><text x="420.0" y="191.0" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600">面试 +267%</text>
  <!-- 底部 -->
  <text x="420" y="350" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="500" opacity="1">50次小验证 > 1次面试2小时</text>
  <text x="420" y="370" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">求职周期：6-8月 → 2-3月（降60%）</text>
</svg>