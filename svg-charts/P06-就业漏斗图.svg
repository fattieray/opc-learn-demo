<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">就业漏斗：传统模式 vs 平台模式</text>
  <!-- 传统漏斗 -->
  <text x="200" y="70" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13" font-weight="600">传统模式</text>
  <polygon points="100,90 300,90 270,300 130,300" fill="#fecaca" stroke="#f87171" stroke-width="1.5"/>
  <line x1="140" y1="140" x2="260" y2="140" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="120" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="13" font-weight="600">投递简历</text>
  <text x="200" y="135" text-anchor="middle" fill="#b91c1c" font-family="sans-serif" font-size="18" font-weight="800">47份</text>
  <line x1="155" y1="190" x2="245" y2="190" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="170" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="13" font-weight="600">获得面试</text>
  <text x="200" y="185" text-anchor="middle" fill="#b91c1c" font-family="sans-serif" font-size="18" font-weight="800">3个</text>
  <line x1="170" y1="240" x2="230" y2="240" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="220" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="13" font-weight="600">收到Offer</text>
  <text x="200" y="235" text-anchor="middle" fill="#b91c1c" font-family="sans-serif" font-size="18" font-weight="800">1个</text>
  <text x="200" y="280" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="11">转化率 2.1%</text>
  <!-- 平台漏斗 -->
  <text x="600" y="70" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13" font-weight="600">平台模式</text>
  <polygon points="500,90 700,90 670,300 530,300" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="540" y1="140" x2="660" y2="140" stroke="#86efac" stroke-width="1"/>
  <text x="600" y="120" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="13" font-weight="600">精准匹配</text>
  <text x="600" y="135" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="18" font-weight="800">能力护照</text>
  <line x1="530" y1="190" x2="670" y2="190" stroke="#86efac" stroke-width="1"/>
  <text x="600" y="170" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="13" font-weight="600">获得面试</text>
  <text x="600" y="185" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="18" font-weight="800">11个</text>
  <line x1="545" y1="240" x2="655" y2="240" stroke="#86efac" stroke-width="1"/>
  <text x="600" y="220" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="13" font-weight="600">收到Offer</text>
  <text x="600" y="235" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="18" font-weight="800">4个</text>
  <text x="600" y="280" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="11">转化率 36.4%</text>
  <!-- 箭头 -->
  <path d="M310 195 L490 195" stroke="#2563eb" stroke-width="2.5"/>
  <polygon points="485,189 498,195 485,201" fill="#2563eb"/>
  <text x="400" y="188" text-anchor="middle" fill="#2563eb" font-family="sans-serif" font-size="11" font-weight="600">+267%</text>
</svg>