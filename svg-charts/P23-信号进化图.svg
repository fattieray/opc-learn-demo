<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#d97706"/>
    </marker>
  </defs>
  <text x="450" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">就：信用护照——信号进化</text>
  <!-- 传统简历 -->
  <rect x="30" y="55" width="240" height="190" rx="14" fill="#ffffff" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="55" width="240" height="40" rx="14" fill="#f87171"/>
  <rect x="30" y="81" width="240" height="14" fill="#f87171"/>
  <text x="150" y="81" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">传统简历</text>
  <rect x="50" y="105" width="200" height="32" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="150" y="126" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">自说自话</text>
  <rect x="50" y="145" width="200" height="32" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="150" y="166" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">信号强度：低</text>
  <rect x="50" y="185" width="200" height="32" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="150" y="206" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">造假成本：低</text>
  <!-- 箭头1 -->
  <line x1="275" y1="150" x2="325" y2="150" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowA)"/>
  <!-- 文凭/证书 -->
  <rect x="330" y="55" width="240" height="190" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="55" width="240" height="40" rx="14" fill="url(#gAmber)"/>
  <rect x="330" y="81" width="240" height="14" fill="url(#gAmber)"/>
  <text x="450" y="81" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">文凭/证书</text>
  <rect x="350" y="105" width="200" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="450" y="126" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">18岁一次考试的代理变量</text>
  <rect x="350" y="145" width="200" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="450" y="166" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">信号强度：中</text>
  <rect x="350" y="185" width="200" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="450" y="206" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">造假成本：中</text>
  <!-- 箭头2 -->
  <line x1="575" y1="150" x2="625" y2="150" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <!-- 能力护照 -->
  <rect x="630" y="55" width="240" height="190" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="630" y="55" width="240" height="40" rx="14" fill="url(#gGreen)"/>
  <rect x="630" y="81" width="240" height="14" fill="url(#gGreen)"/>
  <text x="750" y="81" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">能力护照</text>
  <rect x="650" y="105" width="200" height="32" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="750" y="126" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">证据驱动 · 可验证 · 防伪造</text>
  <rect x="650" y="145" width="200" height="32" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="750" y="166" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">信号强度：高</text>
  <rect x="650" y="185" width="200" height="32" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="750" y="206" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">造假成本：极高</text>
  <!-- 底部 -->
  <rect x="30" y="265" width="840" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="290" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600">能力护照包含：技能矩阵 + AI能力叙事 + 任务履历 + 成长轨迹</text>
  <text x="450" y="312" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">信任机制：任务完成 → 雇主验收 → LLM交叉验证 → 信用更新</text>
</svg>