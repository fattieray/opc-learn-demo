<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <text x="450" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">就：信用护照——信号进化</text>
  <!-- 三阶段 -->
  <rect x="30" y="70" width="240" height="180" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="150" y="100" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="14" font-weight="700">传统简历</text>
  <rect x="50" y="115" width="200" height="35" rx="6" fill="#fff" stroke="#fecaca"/>
  <text x="150" y="137" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">自说自话</text>
  <rect x="50" y="158" width="200" height="35" rx="6" fill="#fff" stroke="#fecaca"/>
  <text x="150" y="180" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">信号强度：低</text>
  <rect x="50" y="201" width="200" height="35" rx="6" fill="#fff" stroke="#fecaca"/>
  <text x="150" y="223" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="11">造假成本：低</text>
  <!-- 箭头1 -->
  <path d="M275 160 L325 160" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="320,154 333,160 320,166" fill="#f59e0b"/>
  <!-- 文凭 -->
  <rect x="330" y="70" width="240" height="180" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="100" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="14" font-weight="700">文凭/证书</text>
  <rect x="350" y="115" width="200" height="35" rx="6" fill="#fff" stroke="#fde68a"/>
  <text x="450" y="137" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="11">18岁一次考试的代理变量</text>
  <rect x="350" y="158" width="200" height="35" rx="6" fill="#fff" stroke="#fde68a"/>
  <text x="450" y="180" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="11">信号强度：中</text>
  <rect x="350" y="201" width="200" height="35" rx="6" fill="#fff" stroke="#fde68a"/>
  <text x="450" y="223" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="11">造假成本：中</text>
  <!-- 箭头2 -->
  <path d="M575 160 L625 160" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="620,154 633,160 620,166" fill="#22c55e"/>
  <!-- 能力护照 -->
  <rect x="630" y="70" width="240" height="180" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="750" y="100" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="14" font-weight="700">能力护照</text>
  <rect x="650" y="115" width="200" height="35" rx="6" fill="#fff" stroke="#bbf7d0"/>
  <text x="750" y="137" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="11">证据驱动 · 可验证 · 防伪造</text>
  <rect x="650" y="158" width="200" height="35" rx="6" fill="#fff" stroke="#bbf7d0"/>
  <text x="750" y="180" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="11">信号强度：高</text>
  <rect x="650" y="201" width="200" height="35" rx="6" fill="#fff" stroke="#bbf7d0"/>
  <text x="750" y="223" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="11">造假成本：极高</text>
  <!-- 底部 -->
  <rect x="30" y="270" width="840" height="55" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="295" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="13" font-weight="600">能力护照包含：技能矩阵 + AI能力叙事 + 任务履历 + 成长轨迹</text>
  <text x="450" y="315" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">信任机制：任务完成 → 雇主验收 → LLM交叉验证 → 信用更新</text>
</svg>