<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Row 1 -->
  <rect x="20" y="15" width="445" height="82" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="58" cy="56" r="20" fill="#2563eb"/><text x="58" y="60" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q1</text>
  <text x="90" y="48" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">就业率与就业质量如何保障？</text>
  <text x="90" y="70" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">考核指标 · 学校声誉 · 招生生源</text>

  <rect x="495" y="15" width="445" height="82" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="533" cy="56" r="20" fill="#7c3aed"/><text x="533" y="60" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q2</text>
  <text x="565" y="48" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">专业设置与课程如何快速响应AI时代？</text>
  <text x="565" y="70" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">课程更新周期5-10年 vs 技能半衰期2年</text>

  <!-- Row 2 -->
  <rect x="20" y="112" width="445" height="82" rx="12" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="58" cy="153" r="20" fill="#0d9488"/><text x="58" y="157" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q3</text>
  <text x="90" y="145" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">产教融合如何真正落地？</text>
  <text x="90" y="167" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">校企合作&ldquo;两张皮&rdquo; · 流于形式</text>

  <rect x="495" y="112" width="445" height="82" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="533" cy="153" r="20" fill="#d97706"/><text x="533" y="157" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q4</text>
  <text x="565" y="145" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">学生能力培养如何对接市场需求？</text>
  <text x="565" y="167" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">&ldquo;学了没用的，有用的没学&rdquo;</text>

  <!-- Row 3 -->
  <rect x="20" y="209" width="445" height="82" rx="12" fill="#ffffff" stroke="#e11d48" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="58" cy="250" r="20" fill="#e11d48"/><text x="58" y="254" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q5</text>
  <text x="90" y="242" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">师资队伍如何适应AI时代教学？</text>
  <text x="90" y="264" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">教师能力滞后 · 考核导向偏差</text>

  <rect x="495" y="209" width="445" height="82" rx="12" fill="#ffffff" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="533" cy="250" r="20" fill="#059669"/><text x="533" y="254" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q6</text>
  <text x="565" y="242" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">学校如何形成差异化竞争优势？</text>
  <text x="565" y="264" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">同质化竞争 · 特色不鲜明</text>

  <!-- Row 4 - Q7 centered -->
  <rect x="258" y="306" width="445" height="82" rx="12" fill="#ffffff" stroke="#1e3a5f" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="296" cy="347" r="20" fill="#1e3a5f"/><text x="296" y="351" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700">Q7</text>
  <text x="328" y="339" text-anchor="start" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="1">投入新项目的风险与收益如何？</text>
  <text x="328" y="361" text-anchor="start" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">决策风险 · 资源有限 · 政绩考量</text>

  <!-- 底部说明 -->
  <text x="480" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">这7个问题不是孤立的，而是相互关联的系统挑战 → 我们用一套方案，系统性地回答</text>
</svg>