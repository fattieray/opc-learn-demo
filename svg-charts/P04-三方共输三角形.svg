<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- 三角形虚线 -->
  <polygon points="410,70 110,440 710,440" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- 学生 -->
  <rect x="310" y="30" width="200" height="90" rx="14" fill="#ffffff" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="62" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">学 生</text>
  <text x="410" y="85" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">有能力无信号 → 被低估</text>
  <!-- 大学 -->
  <rect x="20" y="390" width="200" height="90" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="422" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">大 学</text>
  <text x="120" y="445" text-anchor="middle" fill="#b45309" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">有教学无验证 → 学分贬值</text>
  <!-- 企业 -->
  <rect x="600" y="390" width="200" height="90" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="422" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">企 业</text>
  <text x="700" y="445" text-anchor="middle" fill="#15803d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">有需求无匹配 → 高成本试错</text>
  <!-- 断裂连接 -->
  <line x1="340" y1="120" x2="165" y2="390" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="225" y="250" text-anchor="middle" fill="#f87171" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">信号失真</text>
  <line x1="480" y1="120" x2="655" y2="390" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="595" y="250" text-anchor="middle" fill="#f87171" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">悬崖式切换</text>
  <line x1="225" y1="435" x2="595" y2="435" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="410" y="460" text-anchor="middle" fill="#f87171" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" opacity="1">无反馈回路</text>
  <!-- 中心 -->
  <circle cx="410" cy="310" r="42" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="410" y="305" text-anchor="middle" fill="#e11d48" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" opacity="1">缺失</text>
  <text x="410" y="322" text-anchor="middle" fill="#e11d48" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" opacity="1">连接层</text>
  <!-- 底部 -->
  <rect x="210" y="490" width="400" height="24" rx="12" fill="#0f172a"/>
  <text x="410" y="506" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">缺失的是连接三方的&ldquo;能力信号基础设施&rdquo;</text>
</svg>