<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="410" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">师资队伍困境</text>
  <rect x="30" y="50" width="360" height="250" rx="14" fill="#ffffff" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="360" height="44" rx="14" fill="#f87171"/>
  <rect x="30" y="78" width="360" height="16" fill="#f87171"/>
  <text x="210" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" opacity="1">教师能力滞后</text>
  <rect x="55" y="108" width="310" height="40" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="210" y="133" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">未经历过AI时代的工作场景</text>
  <rect x="55" y="158" width="310" height="40" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="210" y="183" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">缺乏真实项目经验</text>
  <rect x="55" y="208" width="310" height="40" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="210" y="233" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">不了解市场最新需求</text>
  <rect x="55" y="260" width="310" height="26" rx="6" fill="#fecaca"/>
  <text x="210" y="278" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">教的内容可能已经过时</text>
  <rect x="430" y="50" width="360" height="250" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="430" y="50" width="360" height="44" rx="14" fill="#f59e0b"/>
  <rect x="430" y="78" width="360" height="16" fill="#f59e0b"/>
  <text x="610" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" opacity="1">考核导向偏差</text>
  <rect x="455" y="108" width="310" height="40" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="610" y="133" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">论文 + 课题 = 职称晋升</text>
  <rect x="455" y="158" width="310" height="40" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="610" y="183" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">学生就业质量 ≠ 教师考核</text>
  <rect x="455" y="208" width="310" height="40" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="610" y="233" text-anchor="middle" fill="#78350f" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">激励结构决定了行为</text>
  <rect x="455" y="260" width="310" height="26" rx="6" fill="#fde68a"/>
  <text x="610" y="278" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">不是教师不努力，是系统设计如此</text>
  <rect x="200" y="315" width="420" height="20" rx="10" fill="#0f172a"/>
  <text x="410" y="329" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500" opacity="1">关键洞察：不是要求教师&ldquo;全知全能&rdquo;，而是为教师提供工具和数据</text>
</svg>