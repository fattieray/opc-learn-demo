<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">师资队伍困境</text>
  <rect x="40" y="60" width="340" height="230" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="210" y="95" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="15" font-weight="700">教师能力滞后</text>
  <rect x="65" y="115" width="290" height="38" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="210" y="139" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">未经历过AI时代的工作场景</text>
  <rect x="65" y="163" width="290" height="38" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="210" y="187" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">缺乏真实项目经验</text>
  <rect x="65" y="211" width="290" height="38" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="210" y="235" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">不了解市场最新需求</text>
  <rect x="65" y="259" width="290" height="22" rx="6" fill="#fecaca"/>
  <text x="210" y="275" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="10">教的内容可能已经过时</text>
  <rect x="420" y="60" width="340" height="230" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="95" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="15" font-weight="700">考核导向偏差</text>
  <rect x="445" y="115" width="290" height="38" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="590" y="139" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">论文 + 课题 = 职称晋升</text>
  <rect x="445" y="163" width="290" height="38" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="590" y="187" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">学生就业质量 ≠ 教师考核</text>
  <rect x="445" y="211" width="290" height="38" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="590" y="235" text-anchor="middle" fill="#78350f" font-family="sans-serif" font-size="12">激励结构决定了行为</text>
  <rect x="445" y="259" width="290" height="22" rx="6" fill="#fde68a"/>
  <text x="590" y="275" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="10">不是教师不努力，是系统设计如此</text>
  <rect x="200" y="305" width="400" height="12" rx="4" fill="#0f172a"/>
  <text x="400" y="314" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="9">关键洞察：不是要求教师"全知全能"，而是为教师提供工具和数据</text>
</svg>