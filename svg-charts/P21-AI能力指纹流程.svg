<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#d97706"/>
    </marker>
  </defs>
  <text x="450" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">学：AI能力感知系统</text>
  <!-- 数据输入 -->
  <rect x="30" y="50" width="200" height="220" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="200" height="40" rx="14" fill="url(#gBlue)"/>
  <rect x="30" y="76" width="200" height="14" fill="url(#gBlue)"/>
  <text x="130" y="76" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">数据输入</text>
  <rect x="50" y="100" width="160" height="28" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="119" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">课程作业</text>
  <rect x="50" y="136" width="160" height="28" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="155" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">代码仓库 GitHub</text>
  <rect x="50" y="172" width="160" height="28" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="191" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">设计作品集</text>
  <rect x="50" y="208" width="160" height="28" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="227" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">任务记录 + 反馈</text>
  <!-- 箭头1 -->
  <line x1="235" y1="160" x2="290" y2="160" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <!-- LLM分析引擎 -->
  <rect x="300" y="50" width="180" height="220" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="50" width="180" height="40" rx="14" fill="url(#gGreen)"/>
  <rect x="300" y="76" width="180" height="14" fill="url(#gGreen)"/>
  <text x="390" y="76" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">大模型分析引擎</text>
  <rect x="320" y="100" width="140" height="28" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="390" y="119" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">GPT / Claude</text>
  <rect x="320" y="136" width="140" height="28" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="390" y="155" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">多模型交叉验证</text>
  <rect x="320" y="172" width="140" height="28" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="390" y="191" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">可解释评估</text>
  <!-- 箭头2 -->
  <line x1="485" y1="160" x2="540" y2="160" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <!-- 输出 -->
  <rect x="550" y="50" width="320" height="220" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="550" y="50" width="320" height="40" rx="14" fill="url(#gAmber)"/>
  <rect x="550" y="76" width="320" height="14" fill="url(#gAmber)"/>
  <text x="710" y="76" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">输出</text>
  <rect x="570" y="100" width="130" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="635" y="121" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">技能矩阵</text>
  <rect x="710" y="100" width="140" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="780" y="121" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">成长轨迹</text>
  <rect x="570" y="140" width="130" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="635" y="161" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">缺口分析</text>
  <rect x="710" y="140" width="140" height="32" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="780" y="161" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="500">AI能力叙事</text>
  <!-- 动态更新 -->
  <rect x="570" y="185" width="280" height="70" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="710" y="208" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">动态更新</text>
  <text x="710" y="228" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">每次任务自动刷新能力画像</text>
  <text x="710" y="244" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">基于证据，非自述 | 多维比较 | 可解释</text>
</svg>