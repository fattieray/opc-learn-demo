<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">同质化困局：所有学校给学生的都一样</text>
  <!-- 重复卡片 -->
  <rect x="80" y="60" width="200" height="100" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="180" y="90" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="13" font-weight="600">毕业证书</text>
  <text x="180" y="115" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">所有学校都有</text>
  <text x="180" y="140" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">无差异化</text>
  <rect x="300" y="60" width="200" height="100" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="400" y="90" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="13" font-weight="600">成绩单</text>
  <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">学科成绩</text>
  <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">无市场验证</text>
  <rect x="520" y="60" width="200" height="100" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="620" y="90" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="13" font-weight="600">实习证明</text>
  <text x="620" y="115" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">内容模糊</text>
  <text x="620" y="140" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">无能力验证</text>
  <!-- 企业视角 -->
  <rect x="200" y="185" width="400" height="50" rx="10" fill="#fef2f2" stroke="#f87171"/>
  <text x="400" y="207" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="13" font-weight="600">企业视角：无法区分，只能看学校牌子</text>
  <text x="400" y="225" text-anchor="middle" fill="#b91c1c" font-family="sans-serif" font-size="11">→ 应用型本科在"牌子"上天然劣势</text>
  <!-- 问题 -->
  <rect x="200" y="255" width="400" height="50" rx="10" fill="#0f172a"/>
  <text x="400" y="278" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13" font-weight="600">核心问题：没有独特的"品牌标签"</text>
  <text x="400" y="296" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">专业设置趋同 · 培养方案雷同 · 就业报告千篇一律</text>
</svg>