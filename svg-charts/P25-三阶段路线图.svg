  <text x="480" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">三阶段实施路线图</text>
  <!-- Phase 1 -->
  <rect x="20" y="50" width="290" height="330" rx="16" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="50" width="290" height="44" rx="16" fill="url(#gBlue)"/>
  <rect x="20" y="78" width="290" height="16" fill="url(#gBlue)"/>
  <text x="165" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">Phase 1 试点期（0-12月）</text>
  <text x="40" y="115" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">目标</text>
  <text x="40" y="135" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 1-2个专业试点</text>
