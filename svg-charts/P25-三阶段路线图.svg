  <text x="40" y="171" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 能力体检上线</text>
  <text x="40" y="200" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">学校工作</text>
  <text x="40" y="220" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 组织学生注册</text>
  <text x="40" y="238" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 提供课程数据</text>
  <text x="40" y="256" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 配合宣传推广</text>
  <text x="40" y="285" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">预期成果</text>
  <text x="40" y="305" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 学生能力画像生成</text>
  <text x="40" y="323" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 首批任务完成验证</text>
  <text x="40" y="341" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 营收500万</text>
  <!-- 箭头1 -->
  <line x1="315" y1="215" x2="330" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrowS)"/>
  <!-- Phase 2 -->
  <rect x="335" y="50" width="290" height="330" rx="16" fill="#ffffff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="335" y="50" width="290" height="44" rx="16" fill="url(#gGreen)"/>
  <rect x="335" y="78" width="290" height="16" fill="url(#gGreen)"/>
  <text x="480" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">Phase 2 扩展期（6-18月）</text>
  <text x="355" y="115" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">目标</text>
  <text x="355" y="135" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 全校推广</text>
  <text x="355" y="153" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 1000+学生活跃</text>
  <text x="355" y="171" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 企业对接深化</text>
  <text x="355" y="200" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">学校工作</text>
  <text x="355" y="220" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 纳入就业指导体系</text>
  <text x="355" y="238" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 对接本地企业资源</text>
  <text x="355" y="256" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 定期数据复盘</text>
  <text x="355" y="285" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">预期成果</text>
  <text x="355" y="305" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 就业率提升可见</text>
  <text x="355" y="323" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 产教融合案例形成</text>
  <text x="355" y="341" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 营收5000万</text>
  <!-- 箭头2 -->
  <line x1="630" y1="215" x2="645" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrowS)"/>
  <!-- Phase 3 -->
  <rect x="650" y="50" width="290" height="330" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="50" width="290" height="44" rx="16" fill="url(#gAmber)"/>
  <rect x="650" y="78" width="290" height="16" fill="url(#gAmber)"/>
  <text x="795" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">Phase 3 深度期（12-24月）</text>
  <text x="670" y="115" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">目标</text>
  <text x="670" y="135" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 能力护照认证中心</text>
  <text x="670" y="153" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 区域标杆学校</text>
  <text x="670" y="171" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 课程体系优化</text>
  <text x="670" y="200" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">学校工作</text>
  <text x="670" y="220" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 学分体系对接</text>
  <text x="670" y="238" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 教师培训体系</text>
  <text x="670" y="256" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 品牌宣传推广</text>
  <text x="670" y="285" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">预期成果</text>
  <text x="670" y="305" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 差异化品牌形成</text>
  <text x="670" y="323" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 上级认可·社会影响</text>
  <text x="670" y="341" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">· 营收3亿</text>
</svg>