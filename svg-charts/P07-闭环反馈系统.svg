<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- 中心 -->
  <circle cx="460" cy="195" r="60" fill="#0f172a" filter="url(#shadowLg)"/>
  <text x="460" y="188" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700" opacity="1">学校</text>
  <text x="460" y="212" text-anchor="middle" fill="#94a3b8" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">培养体系</text>
  <!-- 学生 -->
  <rect x="40" y="145" width="160" height="100" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="178" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="600" opacity="1">在校学生</text>
  <text x="120" y="200" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">能力体检·任务市场</text>
  <text x="120" y="220" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">能力护照积累</text>
  <!-- 毕业生 -->
  <rect x="720" y="145" width="160" height="100" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="178" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="600" opacity="1">毕业生</text>
  <text x="800" y="200" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">就业状态·薪资变化</text>
  <text x="800" y="220" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="400" opacity="1">职业发展轨迹</text>
  <!-- 企业 -->
  <rect x="390" y="310" width="140" height="50" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="340" text-anchor="middle" fill="#92400e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="600" opacity="1">合作企业</text>
  <!-- 连接 -->
  <path d="M205 195 Q310 130 395 195" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowB)"/>
  <text x="300" y="148" text-anchor="middle" fill="#2563eb" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">培养数据</text>
  <path d="M525 195 Q630 130 715 195" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowG)"/>
  <text x="625" y="148" text-anchor="middle" fill="#22c55e" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">能力护照</text>
  <path d="M715 245 Q630 290 535 335" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <polygon points="540,330 528,335 540,340" fill="#f59e0b"/>
  <text x="630" y="298" text-anchor="middle" fill="#f59e0b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">就业反馈</text>
  <path d="M385 335 Q280 350 205 245" stroke="#7c3aed" stroke-width="2" fill="none"/>
  <polygon points="210,250 198,240 195,253" fill="#7c3aed"/>
  <text x="280" y="348" text-anchor="middle" fill="#7c3aed" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">课程优化建议</text>
  <!-- 标题 -->
  <rect x="385" y="15" width="150" height="28" rx="14.0" fill="#7c3aed"/><text x="460.0" y="33.0" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">闭环反馈系统</text>
  <!-- 底部 -->
  <text x="460" y="385" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" opacity="1">学校第一次能够追踪毕业生的真实发展轨迹，形成培养-就业的闭环反馈</text>
</svg>