<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <text x="450" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">传统模式 vs 能力护照模式</text>
  <!-- 传统 -->
  <rect x="40" y="60" width="370" height="250" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="225" y="95" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="15" font-weight="700">传统模式</text>
  <rect x="70" y="115" width="150" height="170" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="145" y="145" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="13" font-weight="600">毕业证书</text>
  <text x="145" y="170" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">所有学校都有</text>
  <text x="145" y="190" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">无差异化</text>
  <text x="145" y="220" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">企业无法区分</text>
  <rect x="240" y="115" width="150" height="170" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="315" y="145" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="13" font-weight="600">成绩单</text>
  <text x="315" y="170" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">学科成绩</text>
  <text x="315" y="190" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">无市场验证</text>
  <text x="315" y="220" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">无能力证据</text>
  <!-- 箭头 -->
  <path d="M415 185 L475 185" stroke="#7c3aed" stroke-width="3"/>
  <polygon points="470,178 485,185 470,192" fill="#7c3aed"/>
  <!-- 平台 -->
  <rect x="490" y="60" width="370" height="250" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="675" y="95" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="15" font-weight="700">能力护照模式</text>
  <rect x="520" y="115" width="150" height="170" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <text x="595" y="140" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="13" font-weight="700">能力护照</text>
  <text x="595" y="165" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">证据驱动</text>
  <text x="595" y="185" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">雇主验证</text>
  <text x="595" y="205" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">能力可追溯</text>
  <rect x="560" y="230" width="70" height="22" rx="6" fill="#22c55e"/>
  <text x="595" y="245" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="10" font-weight="600">★ 独特标签</text>
  <rect x="690" y="115" width="150" height="170" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="765" y="140" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="13" font-weight="700">任务履历</text>
  <text x="765" y="165" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">真实项目经验</text>
  <text x="765" y="185" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">雇主好评率</text>
  <text x="765" y="205" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">成长轨迹</text>
  <rect x="730" y="230" width="70" height="22" rx="6" fill="#3b82f6"/>
  <text x="765" y="245" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="10" font-weight="600">★ 企业认可</text>
  <rect x="250" y="320" width="400" height="15" rx="4" fill="#f0fdf4"/>
  <text x="450" y="332" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="10">学校成为"能力护照认证中心" → 毕业生带着"被验证的能力证据"走向市场</text>
</svg>