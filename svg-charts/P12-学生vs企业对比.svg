<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="410" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">能力错配：学生视角 vs 企业视角</text>
  <rect x="30" y="50" width="360" height="270" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="360" height="44" rx="14" fill="url(#gBlue)"/>
  <rect x="30" y="78" width="360" height="16" fill="url(#gBlue)"/>
  <text x="210" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" opacity="1">学生视角</text>
  <rect x="55" y="108" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="210" y="135" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">&ldquo;编译原理很熟，没做过真实项目&rdquo;</text>
  <rect x="55" y="162" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="210" y="189" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">&ldquo;4P理论精通，没做过投放实验&rdquo;</text>
  <rect x="55" y="216" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="210" y="243" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">&ldquo;学了4年，面试要的是Python+SQL&rdquo;</text>
  <rect x="55" y="272" width="310" height="32" rx="8" fill="#dbeafe"/>
  <text x="210" y="293" text-anchor="middle" fill="#1e40af" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">→ 有知识无能力，有成绩无证据</text>
  <rect x="430" y="50" width="360" height="270" rx="14" fill="#ffffff" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="430" y="50" width="360" height="44" rx="14" fill="#f87171"/>
  <rect x="430" y="78" width="360" height="16" fill="#f87171"/>
  <text x="610" y="78" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" opacity="1">企业视角</text>
  <rect x="455" y="108" width="310" height="44" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="610" y="135" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">简历 = 自说自话</text>
  <rect x="455" y="162" width="310" height="44" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="610" y="189" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">文凭 = 18岁一次考试的代理变量</text>
  <rect x="455" y="216" width="310" height="44" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="610" y="243" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">面试2小时 = 盲人摸象</text>
  <rect x="455" y="272" width="310" height="32" rx="8" fill="#fecaca"/>
  <text x="610" y="293" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">→ 强信号≠好能力，好能力发不出信号</text>
  <text x="410" y="345" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="500" opacity="1">双方都在&ldquo;猜&rdquo;——缺失的是&ldquo;被验证的能力证据&rdquo;</text>
</svg>