<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">能力错配：学生视角 vs 企业视角</text>
  <rect x="40" y="60" width="340" height="250" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="95" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="15" font-weight="700">学生视角</text>
  <rect x="65" y="115" width="290" height="40" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="210" y="140" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="12">"编译原理很熟，没做过真实项目"</text>
  <rect x="65" y="165" width="290" height="40" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="210" y="190" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="12">"4P理论精通，没做过投放实验"</text>
  <rect x="65" y="215" width="290" height="40" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="210" y="240" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="12">"学了4年，面试要的是Python+SQL"</text>
  <rect x="65" y="270" width="290" height="30" rx="6" fill="#dbeafe"/>
  <text x="210" y="290" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="11" font-weight="600">→ 有知识无能力，有成绩无证据</text>
  <rect x="420" y="60" width="340" height="250" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="590" y="95" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="15" font-weight="700">企业视角</text>
  <rect x="445" y="115" width="290" height="40" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="590" y="140" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">简历 = 自说自话</text>
  <rect x="445" y="165" width="290" height="40" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="590" y="190" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">文凭 = 18岁一次考试的代理变量</text>
  <rect x="445" y="215" width="290" height="40" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="590" y="240" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">面试2小时 = 盲人摸象</text>
  <rect x="445" y="270" width="290" height="30" rx="6" fill="#fecaca"/>
  <text x="590" y="290" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="11" font-weight="600">→ 强信号不等于好能力，好能力发不出信号</text>
  <text x="400" y="330" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">双方都在"猜"——缺失的是"被验证的能力证据"</text>
</svg>