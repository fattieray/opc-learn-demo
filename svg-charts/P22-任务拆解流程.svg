<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#d97706"/>
    </marker>
  </defs>
  <text x="450" y="28" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">练：任务市场——从微任务到准雇佣</text>
  <!-- 传统模式 -->
  <rect x="30" y="50" width="250" height="260" rx="14" fill="#ffffff" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="250" height="40" rx="14" fill="#f87171"/>
  <rect x="30" y="76" width="250" height="14" fill="#f87171"/>
  <text x="155" y="76" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">传统模式</text>
  <rect x="50" y="100" width="210" height="50" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="155" y="122" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">一个岗位 = 长期全职</text>
  <text x="155" y="140" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">固定关系 · 高试错成本</text>
  <rect x="50" y="158" width="210" height="50" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>
  <text x="155" y="180" text-anchor="middle" fill="#7f1d1d" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">校招：1200份简历→5人入职</text>
  <text x="155" y="198" text-anchor="middle" fill="#b91c1c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">3个月后仅2人留存</text>
  <rect x="50" y="216" width="210" height="40" rx="8" fill="#fecaca"/>
  <text x="155" y="234" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">转化率 0.4%</text>
  <text x="155" y="250" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">成本 5万/人</text>
  <!-- 箭头 -->
  <line x1="285" y1="180" x2="340" y2="180" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowB)"/>
  <!-- 平台模式 -->
  <rect x="350" y="50" width="520" height="260" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="350" y="50" width="520" height="40" rx="14" fill="url(#gGreen)"/>
  <rect x="350" y="76" width="520" height="14" fill="url(#gGreen)"/>
  <text x="610" y="76" text-anchor="middle" fill="#ffffff" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">平台模式：企业需求 → LLM智能拆解 → 学生任务</text>
  <!-- 企业需求 -->
  <rect x="375" y="100" width="120" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="435" y="128" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">企业需求</text>
  <text x="435" y="148" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">"需要做一套"</text>
  <text x="435" y="164" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">"营销方案"</text>
  <!-- 拆解箭头 -->
  <line x1="500" y1="140" x2="540" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <!-- LLM拆解 -->
  <rect x="545" y="100" width="120" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="605" y="124" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">LLM拆解</text>
  <text x="605" y="146" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">任务A: 市场调研</text>
  <text x="605" y="164" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">任务B: 文案撰写</text>
  <!-- 匹配箭头 -->
  <line x1="670" y1="140" x2="710" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <!-- 智能匹配 -->
  <rect x="715" y="100" width="130" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="780" y="124" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600">智能匹配</text>
  <text x="780" y="146" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">匹配度 92%</text>
  <text x="780" y="164" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10">张伟 78分</text>
  <!-- 关键优势 -->
  <rect x="375" y="195" width="470" height="100" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="610" y="220" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700">关键优势</text>
  <text x="610" y="244" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">验证门槛低（只需完成这个小任务）</text>
  <text x="610" y="264" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">累积验证强（50次小验证 &gt; 1次面试）</text>
  <text x="610" y="284" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">企业成本降84%（5万→0.8万）· 3月留存率 60%→85%</text>
</svg>