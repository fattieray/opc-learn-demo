<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <text x="450" y="30" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="16" font-weight="700">练：任务市场——从微任务到准雇佣</text>
  <!-- 传统 -->
  <rect x="30" y="60" width="250" height="250" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="155" y="90" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="14" font-weight="700">传统模式</text>
  <rect x="55" y="110" width="200" height="50" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="155" y="132" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">一个岗位 = 长期全职</text>
  <text x="155" y="150" text-anchor="middle" fill="#b91c1c" font-family="sans-serif" font-size="11">固定关系 · 高试错成本</text>
  <rect x="55" y="175" width="200" height="50" rx="8" fill="#fff" stroke="#fecaca"/>
  <text x="155" y="197" text-anchor="middle" fill="#7f1d1d" font-family="sans-serif" font-size="12">校招：1200份简历→5人入职</text>
  <text x="155" y="215" text-anchor="middle" fill="#b91c1c" font-family="sans-serif" font-size="11">3个月后仅2人留存</text>
  <rect x="55" y="240" width="200" height="50" rx="8" fill="#fecaca"/>
  <text x="155" y="262" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="12" font-weight="600">转化率 0.4%</text>
  <text x="155" y="280" text-anchor="middle" fill="#991b1b" font-family="sans-serif" font-size="11">成本 5万/人</text>
  <!-- 箭头 -->
  <path d="M285 185 L335 185" stroke="#2563eb" stroke-width="3"/>
  <polygon points="330,178 345,185 330,192" fill="#2563eb"/>
  <!-- 平台 -->
  <rect x="350" y="60" width="520" height="250" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="90" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="14" font-weight="700">平台模式：企业需求 → LLM智能拆解 → 学生任务</text>
  <!-- 企业需求 -->
  <rect x="375" y="110" width="120" height="80" rx="8" fill="#fff" stroke="#bbf7d0"/>
  <text x="435" y="140" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="12" font-weight="600">企业需求</text>
  <text x="435" y="160" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">"需要做一套"</text>
  <text x="435" y="178" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">"营销方案"</text>
  <!-- 拆解 -->
  <path d="M500 150 L540 150" stroke="#22c55e" stroke-width="2"/>
  <polygon points="535,145 545,150 535,155" fill="#22c55e"/>
  <rect x="545" y="110" width="120" height="80" rx="8" fill="#fff" stroke="#bbf7d0"/>
  <text x="605" y="135" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="12" font-weight="600">LLM拆解</text>
  <text x="605" y="158" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">任务A: 市场调研</text>
  <text x="605" y="175" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">任务B: 文案撰写</text>
  <!-- 匹配 -->
  <path d="M670 150 L710 150" stroke="#22c55e" stroke-width="2"/>
  <polygon points="705,145 715,150 705,155" fill="#22c55e"/>
  <rect x="715" y="110" width="130" height="80" rx="8" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="135" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="12" font-weight="600">智能匹配</text>
  <text x="780" y="158" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">匹配度 92%</text>
  <text x="780" y="175" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">张伟 78分</text>
  <!-- 底部收益 -->
  <rect x="375" y="210" width="470" height="80" rx="10" fill="#fff" stroke="#22c55e"/>
  <text x="610" y="235" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="12" font-weight="700">关键优势</text>
  <text x="610" y="258" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">验证门槛低（只需完成这个小任务）· 累积验证强（50次小验证 > 1次面试）</text>
  <text x="610" y="278" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">所有学生平等参与 · 企业成本降84%（5万→0.8万）· 3月留存率 60%→85%</text>
</svg>