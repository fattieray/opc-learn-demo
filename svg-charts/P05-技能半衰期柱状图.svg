<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="410" y="30" text-anchor="middle" fill="#0f172a" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" opacity="1">技能半衰期变化趋势</text>
  <!-- 柱状图 -->
  <rect x="70" y="70" width="110" height="200" rx="6" fill="#94a3b8" filter="url(#shadow)"/>
  <text x="125" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">10年+</text>
  <text x="125" y="290" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">2000年前</text>
  <rect x="210" y="120" width="110" height="150" rx="6" fill="#64748b" filter="url(#shadow)"/>
  <text x="265" y="112" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">5-7年</text>
  <text x="265" y="290" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">2010年</text>
  <rect x="350" y="155" width="110" height="115" rx="6" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="405" y="148" text-anchor="middle" fill="#d97706" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">3-5年</text>
  <text x="405" y="290" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">2020年</text>
  <rect x="490" y="180" width="110" height="90" rx="6" fill="#f97316" filter="url(#shadow)"/>
  <text x="545" y="173" text-anchor="middle" fill="#ea580c" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">2-3年</text>
  <text x="545" y="290" text-anchor="middle" fill="#475569" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="500" opacity="1">2025年</text>
  <rect x="630" y="200" width="110" height="70" rx="6" fill="#e11d48" filter="url(#shadow)"/>
  <text x="685" y="193" text-anchor="middle" fill="#dc2626" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" opacity="1">1.5-2年</text>
  <text x="685" y="290" text-anchor="middle" fill="#dc2626" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" opacity="1">AI时代</text>
  <!-- 警示线 -->
  <line x1="50" y1="230" x2="770" y2="230" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="780" y="234" text-anchor="start" fill="#e11d48" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="500" opacity="1">课程更新周期</text>
  <!-- 底部 -->
  <rect x="50" y="315" width="340" height="36" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="1"/>
  <text x="220" y="338" text-anchor="middle" fill="#991b1b" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">⚠ 挑战：入学时学的技能，毕业时已过时</text>
  <rect x="430" y="315" width="340" height="36" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="338" text-anchor="middle" fill="#166534" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" opacity="1">✦ 机会：大模型让新解法首次成为可能</text>
  <!-- 趋势箭头 -->
  <path d="M125 65 L685 195" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
</svg>