version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: opc-backend
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/opc_learn.db
      - SECRET_KEY=opc-learn-docker-secret-key-2024
      - CORS_ORIGINS=["http://124.221.40.35","http://localhost:3000"]
      - ENVIRONMENT=production
    volumes:
      - backend-data:/app
    restart: unless-stopped
    networks:
      - opc-network

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://124.221.40.35:9000/api/v1
    container_name: opc-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://124.221.40.35:9000/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - opc-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: opc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - opc-network

volumes:
  backend-data:

networks:
  opc-network:
    driver: bridge
